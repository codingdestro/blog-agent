<!-- <!doctype html> -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/generator.css" />
  </head>
  <body>
    <!-- ── NAV ── -->
    <nav class="topnav">
      <a href="/index.html" class="topnav-brand">
        <div class="brand-icon">
          <svg
            viewBox="0 0 16 16"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M2 4h12M2 8h8M2 12h10"
              stroke="#fff"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <span class="brand-label">AI Blog Generator</span>
      </a>
      <a href="/index.html" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path
            d="M9 2L4 7l5 5"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Back to project
      </a>
    </nav>

    <div class="shell">
      <!-- ── PAGE HEADER ── -->
      <div class="page-header">
        <div>
          <h1>Blog <em>Generator</em></h1>
          <p>
            Generate sourced blog drafts from a topic and optional reference
            files.
          </p>
        </div>
        <span id="status" class="status-pill">
          <span class="status-dot"></span>
          Ready
        </span>
      </div>

      <!-- ── MAIN GRID ── -->
      <div class="main-grid">
        <!-- FORM -->
        <aside>
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-header-icon">
                <svg
                  viewBox="0 0 16 16"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M3 3h10M3 6.5h10M3 10h6"
                    stroke-width="1.6"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <div>
                <div class="form-card-title">New Article</div>
                <div class="form-card-sub">Configure your generation</div>
              </div>
            </div>
            <form id="blog-form" class="form-body">
              <label>
                <span class="label-text">Topic</span>
                <textarea
                  name="topic"
                  class="topic-input"
                  minlength="3"
                  maxlength="300"
                  placeholder="e.g. AI agents in healthcare operations"
                  required
                  style="
                    width: 100%;
                    border: 1px solid var(--line);
                    border-radius: 7px;
                    padding: 10px 12px;
                    font:
                      14px/1.5 &quot;Outfit&quot;,
                      sans-serif;
                    background: #fafbfc;
                    resize: none;
                    transition:
                      border-color 0.15s,
                      box-shadow 0.15s,
                      background 0.15s;
                    color: var(--text);
                  "
                  onfocus="
                    this.style.borderColor = 'var(--accent)';
                    this.style.background = '#fff';
                    this.style.outline = 'none';
                    this.style.boxShadow = '0 0 0 3px rgb(15 118 110 / 12%)';
                  "
                  onblur="
                    this.style.borderColor = 'var(--line)';
                    this.style.background = '#fafbfc';
                    this.style.boxShadow = 'none';
                  "
                ></textarea>
              </label>

              <div class="form-row">
                <label>
                  <span class="label-text">Tone</span>
                  <input
                    name="tone"
                    type="text"
                    value="clear, useful, and professional"
                  />
                </label>
                <label>
                  <span class="label-text">Audience</span>
                  <input name="audience" type="text" value="general readers" />
                </label>
              </div>

              <label>
                <span class="label-text">Word count</span>
                <input
                  name="word_count"
                  type="number"
                  min="300"
                  max="3000"
                  value="900"
                />
              </label>

              <label>
                <span class="label-text">Source files</span>
                <div
                  class="file-label"
                  onclick="document.getElementById('file-input').click()"
                >
                  <span class="file-label-icon">📎</span>
                  <div class="file-label-text">
                    <strong id="file-label-name">Choose files</strong>
                    .txt, .md, .csv, .json, .yaml, .xml, .log
                  </div>
                </div>
                <input
                  id="file-input"
                  name="files"
                  type="file"
                  multiple
                  accept=".txt,.md,.csv,.json,.yaml,.yml,.xml,.log"
                  onchange="updateFileLabel(this)"
                />
              </label>

              <button type="submit" class="btn-generate" id="gen-btn">
                <svg viewBox="0 0 16 16" fill="none" class="btn-gen-icon">
                  <path
                    d="M8 2v4M8 10v4M2 8h4M10 8h4M4.22 4.22l2.83 2.83M8.95 8.95l2.83 2.83M11.78 4.22 8.95 7.05M7.05 8.95 4.22 11.78"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
                <div class="spinner" id="spinner"></div>
                <span id="gen-label">Generate blog</span>
              </button>
            </form>
          </div>
        </aside>

        <!-- OUTPUT -->
        <div class="output-panel">
          <div class="output-card" id="output-card">
            <div class="output-card-header">
              <span class="output-card-title">Generated Output</span>
              <div class="output-actions">
                <button
                  class="btn-copy"
                  id="copy-btn"
                  onclick="copyOutput()"
                  title="Copy to clipboard"
                  style="display: none"
                >
                  <svg viewBox="0 0 14 14" fill="none">
                    <rect
                      x="4"
                      y="4"
                      width="8"
                      height="9"
                      rx="1.5"
                      stroke="currentColor"
                      stroke-width="1.3"
                    />
                    <path
                      d="M2 9.5V3a1 1 0 0 1 1-1h6.5"
                      stroke="currentColor"
                      stroke-width="1.3"
                      stroke-linecap="round"
                    />
                  </svg>
                  Copy
                </button>
              </div>
            </div>
            <div class="output-body">
              <div class="empty-state" id="empty-state">
                <div class="empty-icon">✍️</div>
                <p>Your generated article will appear here.</p>
              </div>
              <div class="article" id="output" style="display: none"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── RECENT BLOGS ── -->
      <div class="recent-section" style="margin-top: 48px">
        <div class="recent-header">
          <h2 class="recent-title">Recent Articles</h2>
          <span class="recent-count" id="recent-count">3 articles</span>
        </div>
        <div class="blog-cards" id="blog-cards">
          <!-- injected by JS -->
        </div>
      </div>
    </div>

    <!-- ── MODAL ── -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">Article Title</h2>
          <button class="modal-close" onclick="closeModalDirect()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path
                d="M1 1l10 10M11 1 1 11"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <div class="modal-body article" id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn-copy" id="modal-copy-btn" onclick="copyModal()">
            <svg viewBox="0 0 14 14" fill="none">
              <rect
                x="4"
                y="4"
                width="8"
                height="9"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.3"
              />
              <path
                d="M2 9.5V3a1 1 0 0 1 1-1h6.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
            Copy article
          </button>
          <button
            class="btn-generate"
            style="width: auto; height: 36px; padding: 0 16px; font-size: 13px"
            onclick="closeModalDirect()"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script>
      async function fetch_atricals() {
        try {
          const res = await fetch("/api/blogs/summaries", {
            method: "GET",
          });

          const summaries = await res.json();
          return summaries;
        } catch {
          console.log("there is an error to fetch the articles summaries");
        }
      }

      /* ── RENDER CARDS ── */
      async function renderCards() {
        const container = document.getElementById("blog-cards");
        const recentBlogs = await fetch_atricals();
        document.getElementById("recent-count").textContent =
          `${recentBlogs.length} article${recentBlogs.length !== 1 ? "s" : ""}`;
        if (!recentBlogs.length) {
          container.innerHTML = `<div class="recent-empty" style="grid-column:1/-1"><strong>No articles yet</strong>Generate your first article above.</div>`;
          return;
        }
        container.innerHTML = recentBlogs
          .map(
            (b) => `
            <div class="blog-card" >
              <div class="blog-card-meta">
                <span class="blog-tag">${b.topic}</span>
                <span class="blog-date">${b.created_at.split(" ")[0]}</span>
              </div>
              <h3>${b.title}</h3>
              <p class="blog-excerpt">${b.summary}</p>
              <div class="blog-card-footer">
                  <a href="/blog.html?id=${encodeURIComponent(b.id)}" class="btn-view">
                  View
                  <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
              </div>
            </div>
          `,
          )
          .join("");
      }
      renderCards();

      /* ── COPY ── */
      function copyOutput() {
        const el = document.getElementById("output");
        const text = el.innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.classList.add("copied");
          btn.querySelector("span") ? null : null;
          btn.innerHTML = `<svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 4L12 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
          setTimeout(() => {
            btn.classList.remove("copied");
            btn.innerHTML = `<svg viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 9.5V3a1 1 0 0 1 1-1h6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> Copy`;
          }, 2200);
        });
      }

      /* ── FILE LABEL ── */
      function updateFileLabel(input) {
        const label = document.getElementById("file-label-name");
        if (input.files.length === 0) {
          label.textContent = "Choose files";
          return;
        }
        label.textContent =
          input.files.length === 1
            ? input.files[0].name
            : `${input.files.length} files selected`;
      }

      /* ── STATUS ── */
      function setStatus(text, busy) {
        const el = document.getElementById("status");
        el.textContent = "";
        const dot = document.createElement("span");
        dot.className = "status-dot";
        el.appendChild(dot);
        el.appendChild(document.createTextNode(" " + text));
        el.className = "status-pill" + (busy ? " busy" : "");
      }
    </script>

    <script src="/static/app.js"></script>
  </body>
</html>
